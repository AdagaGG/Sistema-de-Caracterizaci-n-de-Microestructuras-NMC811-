plan_id: nmc811_segmentation_1743108150
objective: Develop a modular Computer Vision pipeline using MobileSAM and Python to automatically segment active material particles in 16-bit FIB-SEM .tif images, generating exportable geometric datasets to Excel for deep statistical analysis of cathode degradation
created_at: '2025-03-26T14:00:00Z'
created_by: gem-planner
status: pending_approval
research_confidence: high

plan_metrics:
  wave_1_task_count: 2
  total_dependencies: 16
  risk_score: medium

tldr: |
  Greenfield Python pipeline implementing FIB-SEM particle segmentation with MobileSAM. Architecture: conda environment setup → TIFF preprocessing (CLAHE) → MobileSAM segmentation (hybrid automatic/manual) → morphological refinement → geometric metrics extraction → multi-stage validation → CSV export + circularity heatmaps. Critical constraints: 8GB VRAM (sequential processing), 16-bit preservation, sub-30min runtime for 6 images. High research confidence (85-100% coverage) with 13 open questions requiring empirical tuning (CLAHE params, kernel sizes, IoU thresholds).

open_questions:
  - MobileSAM checkpoint storage strategy (manual vs programmatic download)
  - Optimal grid sampling density for SAM2AutomaticMaskGenerator
  - Manual refinement prompt storage for reproducibility
  - IoU and stability score thresholds for automatic mask filtering
  - MobileSAM vs SAM2 model variant selection (mobile-sam, efficient-sam, sam2-hiera)
  - CLAHE parameters (clip_limit, tile_grid_size) for FIB-SEM images
  - Structuring element shape/size for morphological opening
  - Circularity calculation method (cv2.arcLength vs regionprops perimeter)
  - Zero-perimeter tolerance for circularity formula
  - Aspect ratio calculation method (minor/major vs width/height)
  - Edge particle detection algorithm (clear_border vs bbox boundary check)
  - Heatmap color LUT implementation (cv2.applyColorMap vs custom mapping)
  - Integration testing strategy for end-to-end pipeline validation

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: VRAM overflow during MobileSAM inference causing OOM crashes
      likelihood: medium
      impact: critical
      mitigation: Implement GPU memory monitoring with torch.cuda.memory_allocated() after each image, force torch.cuda.empty_cache() between images, reduce batch size to 1 image per iteration, add fallback CPU inference mode

    - scenario: Morphological opening fails to separate touching particles in high-density regions
      likelihood: medium
      impact: high
      mitigation: Implement iterative opening with increasing kernel sizes (3x3 → 5x5 → 7x7), add watershed segmentation fallback for persistent clusters, provide manual split interface for researcher review

    - scenario: Segmentation quality degradation from suboptimal CLAHE parameters on FIB-SEM images
      likelihood: high
      impact: medium
      mitigation: Create parameter tuning notebook with side-by-side visual comparison, implement adaptive CLAHE parameter selection based on image histogram statistics, document optimal values in configuration file

    - scenario: Pipeline runtime exceeds 30-minute acceptance criterion due to inefficient processing
      likelihood: medium
      impact: medium
      mitigation: Profile execution time per stage, implement preprocessing caching, optimize mask generation with reduced grid sampling density, parallelize I/O operations where possible

    - scenario: Circularity formula produces NaN/Inf values from zero-perimeter edge cases
      likelihood: low
      impact: high
      mitigation: Add perimeter validation (reject if P < 1 pixel), implement try-except blocks in metrics calculation, log error particles to separate diagnostic file, apply 0.0 circularity default for degenerate cases

    - scenario: Edge particle exclusion removes too many valid samples reducing statistical power
      likelihood: medium
      impact: medium
      mitigation: Implement configurable edge exclusion margin (strict=touch border, relaxed=within N pixels), export both filtered and unfiltered datasets for researcher comparison, document particle rejection statistics

  assumptions:
    - Gold standard images (6 .tif files in gold_standard/) are uncorrupted and representative of full dataset
    - RTX 4060 GPU has sufficient CUDA compute capability (≥7.5) for PyTorch inference
    - MobileSAM pretrained weights are compatible with SAM2 API (or alternative checkpoint source identified)
    - Conda installation is available and functional on target system with admin/user environment creation rights
    - Pixel-to-micron scale factor (0.08431 μm/px) is consistent across all 6 images
    - Manual refinement workload is <10% of total particles (hybrid prompting assumption)
    - 16-bit TIFF images contain single-channel grayscale data (not RGB or multi-channel)
    - Researcher can provide ground truth particle counts for validation (acceptance criterion: >90% detection)

implementation_specification:
  code_structure: |
    Modular pipeline with separation of concerns: preprocessing, segmentation, refinement, metrics, validation, export. Each stage implemented as independent module with clear input/output contracts. Configuration-driven design with YAML/JSON parameter files for tuning. CLI entry point for batch processing with progress tracking.
  
  affected_areas:
    - src/preprocessing/ (new module for TIFF loading, CLAHE, normalization)
    - src/segmentation/ (new module for MobileSAM inference, GPU memory management)
    - src/refinement/ (new module for morphological operations)
    - src/metrics/ (new module for geometric calculations, contour extraction)
    - src/validation/ (new module for multi-stage filtering)
    - src/export/ (new module for CSV consolidation, heatmap generation)
    - src/utils/ (new module for logging, file I/O helpers, visualization utilities)
    - tests/ (unit tests for metrics formulas, integration tests for pipeline)
    - config/ (YAML configuration for CLAHE, morphology, validation thresholds)
    - environment.yml (conda environment specification)
  
  component_details:
    - component: Conda Environment Manager
      responsibility: Create isolated Python environment with PyTorch (CUDA 12.x), tifffile, opencv-python, scikit-image, pandas, matplotlib dependencies
      interfaces:
        - environment.yml specification file
        - Conda CLI for environment activation
    
    - component: TIFF Preprocessing Pipeline
      responsibility: Load 16-bit .tif images with tifffile.imread(), apply CLAHE enhancement (configurable clip_limit, tile_grid_size), normalize to uint8/float32 for downstream operations, preserve original bit depth metadata
      interfaces:
        - preprocess(image_path, config) → preprocessed_image (numpy.ndarray)
        - load_tiff(path) → raw_image (uint16 numpy.ndarray)
        - apply_clahe(image, clip_limit, tile_grid_size) → enhanced_image
    
    - component: MobileSAM Segmentation Engine
      responsibility: Initialize SAM2ImagePredictor/SAM2AutomaticMaskGenerator with MobileSAM checkpoint, generate automatic masks with configurable IoU/stability thresholds, support manual refinement via point/box prompts, return binary instance masks
      interfaces:
        - segment_automatic(image) → List[mask_dict] with 'segmentation', 'area', 'bbox', 'stability_score'
        - segment_manual(image, points, boxes) → refined_mask (binary numpy.ndarray)
        - load_model(checkpoint_path, device) → predictor instance
    
    - component: GPU Memory Manager
      responsibility: Monitor VRAM usage with torch.cuda.memory_allocated(), trigger torch.cuda.empty_cache() between images, log memory statistics, raise ERR_VRAM_001 if usage exceeds 7.5GB threshold
      interfaces:
        - cleanup_vram() → None
        - get_vram_stats() → dict with 'allocated_gb', 'reserved_gb', 'free_gb'
        - check_vram_threshold(threshold_gb) → bool
    
    - component: Morphological Refinement Module
      responsibility: Apply opening operations (erosion + dilation) to separate touching particles, support configurable structuring elements (shape, size), remove noise artifacts with small object removal
      interfaces:
        - refine_mask(binary_mask, kernel_size, kernel_shape) → refined_mask
        - remove_small_objects(mask, min_area) → cleaned_mask
    
    - component: Geometric Metrics Extractor
      responsibility: Extract contours from refined masks with cv2.findContours(), calculate area (cv2.contourArea), perimeter (cv2.arcLength), circularity (4πA/P²), equivalent diameter, aspect ratio, bounding box, centroid coordinates
      interfaces:
        - extract_metrics(labeled_mask, scale_factor_um_per_px) → List[dict] with particle properties
        - calculate_circularity(area, perimeter) → float in [0, 1] range with error handling
    
    - component: Particle Validation Filter
      responsibility: Apply multi-stage filtering (area ∈ [50, 10000] px, aspect ratio ∈ [0.25, 4.0], edge particle exclusion), log rejection statistics, return filtered particle list
      interfaces:
        - validate_particles(particles, image_shape, config) → filtered_particles
        - is_edge_particle(bbox, image_shape) → bool
    
    - component: Heatmap Visualization Generator
      responsibility: Map circularity values to red-green color gradient (red=low/fractured, green=high/intact), overlay colored masks on original images with transparency, save to PNG format
      interfaces:
        - generate_heatmap(image, particles, metric='circularity') → heatmap_image (RGB numpy.ndarray)
        - save_visualization(heatmap, output_path) → None
    
    - component: CSV Export Module
      responsibility: Consolidate metrics from 6 images into pandas DataFrame with columns [Image_ID, Particle_ID, Area_px, Area_um2, Perimeter_px, Perimeter_um, Circularity, EquivDiameter_um, AspectRatio, Centroid_X, Centroid_Y], export to analisis_gold_standard.csv
      interfaces:
        - export_to_csv(all_metrics, output_path) → None
        - create_dataframe(particles, image_name) → pandas.DataFrame

  dependencies:
    - component: TIFF Preprocessing Pipeline
      relationship: Depends on tifffile.imread (external library) for 16-bit loading, cv2.createCLAHE (OpenCV) for enhancement
    - component: MobileSAM Segmentation Engine
      relationship: Depends on TIFF Preprocessing Pipeline for enhanced images, uses PyTorch (torch.cuda) for GPU inference
    - component: Morphological Refinement Module
      relationship: Depends on MobileSAM Segmentation Engine for raw masks, uses cv2.morphologyEx (OpenCV) for operations
    - component: Geometric Metrics Extractor
      relationship: Depends on Morphological Refinement Module for cleaned masks, uses cv2.findContours (OpenCV) for contour extraction
    - component: Particle Validation Filter
      relationship: Depends on Geometric Metrics Extractor for raw particle properties
    - component: Heatmap Visualization Generator
      relationship: Depends on Particle Validation Filter for filtered particles with circularity values
    - component: CSV Export Module
      relationship: Depends on Particle Validation Filter for final particle dataset, uses pandas for DataFrame operations

  integration_points:
    - CLI entry point (src/main.py) orchestrates sequential pipeline execution across 6 images
    - Configuration loading from config/pipeline_config.yaml for CLAHE, morphology, validation thresholds
    - Logging system captures per-image processing time, particle counts, VRAM usage to logs/pipeline_execution.log
    - Error handlers catch ERR_VRAM_001 (OOM), ERR_MASK_002 (no particles), ERR_IO_003 (TIFF read failure), ERR_METRIC_004 (division-by-zero)
    - Progress tracking with tqdm for batch processing visualization in terminal

