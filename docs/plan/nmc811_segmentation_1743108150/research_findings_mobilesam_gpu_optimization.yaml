  data_flow_involving_domain: |
    1. Load 16-bit TIFF from gold_standard/ using tifffile.imread() → numpy.ndarray (3072x1024, uint16)
    2. Apply CLAHE preprocessing → normalized uint8 array for contrast enhancement
    3. Convert to RGB numpy array → input for MobileSAM (H, W, 3)
    4. Initialize SAM2ImagePredictor, set_image() → computes embeddings once per image
    5. Generate automatic masks via SAM2AutomaticMaskGenerator → list of candidate masks
    6. (Optional) Manual refinement with point/box prompts for ambiguous cases → refined masks
    7. Apply morphological opening to binary masks → separated particle masks
    8. Extract contours, calculate geometric metrics → DataFrame with particle data
    9. Append DataFrame to batch accumulator → list of DataFrames
    10. Call torch.cuda.empty_cache(), delete tensors → free VRAM for next image
    11. After all 6 images: pd.concat(all_dfs) → consolidated DataFrame
    12. Export to CSV: df.to_csv('analisis_gold_standard.csv', index=False)
    13. Generate heatmap visualizations → save to output directory

