  scope: |
    Comprehensive exploration of MobileSAM integration patterns, GPU optimization for 8GB VRAM constraints, conda environment configuration, 16-bit TIFF preprocessing pipelines, and sequential batch processing workflows for FIB-SEM images.
  confidence: high
  coverage: 85

