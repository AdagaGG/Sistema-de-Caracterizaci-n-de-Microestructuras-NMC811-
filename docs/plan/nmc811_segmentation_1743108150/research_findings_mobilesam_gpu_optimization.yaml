plan_id: nmc811_segmentation_1743108150
objective: Develop a modular Computer Vision pipeline using MobileSAM and Python to automatically segment active material particles in 16-bit FIB-SEM .tif images, generating exportable geometric datasets to Excel for deep statistical analysis of cathode degradation
focus_area: MobileSAM Integration & GPU Optimization
created_at: 2025-01-26T00:00:00Z
created_by: Research Agent
status: completed

tldr: |
  - MobileSAM is a lightweight variant of SAM optimized for resource-constrained environments (60x speedup vs SAM, suitable for RTX 4060 8GB VRAM)
  - PyTorch provides robust GPU memory management via torch.cuda.empty_cache(), torch.inference_mode(), and autocast with bfloat16/float16 mixed precision
  - Hybrid prompting strategy requires SAM2ImagePredictor with automatic mask generation (grid sampling) + manual refinement via point/box prompts
  - Sequential image processing with VRAM cleanup between images prevents OOM crashes; estimated 300MB VRAM per 3072x1024 image with MobileSAM
  - Conda environment recommended for PyTorch + CUDA 12.x dependency management; critical packages: pytorch, torchvision, tifffile, opencv-python, pandas
  - 16-bit TIFF handling requires tifffile.imread() to preserve bit depth; OpenCV CLAHE and morphological operations work on normalized uint8/float32
  - No existing codebase files found; greenfield implementation required with emphasis on modular design


