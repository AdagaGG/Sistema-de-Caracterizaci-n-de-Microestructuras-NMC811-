open_questions:
- question: How to handle MobileSAM model checkpoint download and storage?
  context: PRD specifies using pretrained MobileSAM; need to determine if checkpoint should be downloaded programmatically or manually placed in a specific directory

- question: What is the optimal grid sampling density for SAM2AutomaticMaskGenerator in automatic mode?
  context: Grid density affects segmentation quality vs inference time; need empirical testing on FIB-SEM images to balance accuracy and speed (<30 min for 6 images)

- question: Should manual refinement prompts be stored for reproducibility?
  context: Hybrid prompting includes manual correction of ambiguous cases; unclear if point/box coordinates should be saved to a JSON file for re-runs

- question: What threshold values for IoU scores and stability scores in automatic mask generation?
  context: SAM2AutomaticMaskGenerator accepts IoU and stability score thresholds to filter low-quality masks; default values may not be optimal for FIB-SEM particle segmentation

- question: How to integrate MobileSAM (lightweight variant) vs SAM2 (full model)?
  context: PRD states "MobileSAM" but research found SAM2 API documentation; need clarification on which model checkpoint to use (mobile-sam, efficient-sam, or sam2-hiera variants)

- question: Is bfloat16 supported on RTX 3050 Laptop GPU (Ampere architecture)?
  context: Research system has RTX 3050 Laptop (4GB VRAM), not RTX 4060 (8GB); need to verify bfloat16 availability or fallback to float16

- question: Should VRAM monitoring be active during execution or only for debugging?
  context: Acceptance criteria requires <7.5GB peak usage verification; unclear if this should be continuous logging or manual profiling

- question: How to handle images with extreme particle density (potential merged masks)?
  context: Morphological opening may not separate all touching particles; need strategy for detecting merged particles and triggering manual refinement

gaps:
- area: MobileSAM model availability and checkpoint paths
  description: No MobileSAM-specific repositories found in GitHub search; unclear if "MobileSAM" refers to mobile-sam, efficient-sam, or a specific SAM2 variant optimized for mobile devices
  impact: Cannot proceed with model initialization without identifying correct checkpoint source (Hugging Face, GitHub release, or custom training)

- area: Conda environment specification file
  description: No environment.yml or requirements.txt found in repository; need to create from scratch with PyTorch CUDA version compatibility matrix
  impact: Delays setup process; risk of dependency conflicts if PyTorch, CUDA, and cuDNN versions are incompatible

- area: CLAHE hyperparameters for FIB-SEM images
  description: No prior research on optimal clipLimit and tileGridSize for CLAHE on 16-bit FIB-SEM microscopy data
  impact: May require empirical tuning to achieve best contrast enhancement without over-amplifying noise

- area: Physical unit conversion validation
  description: PRD specifies 0.08431 μm/px scale but no validation method provided
  impact: Potential systematic error in Area_um2, Perimeter_um, EquivDiameter_um if scale factor is incorrect

- area: Edge particle exclusion algorithm
  description: PRD requires excluding particles touching image borders but no implementation pattern provided
  impact: Need to develop contour-based boundary detection logic (check if any contour point has x=0, x=width-1, y=0, or y=height-1)

- area: Heatmap color scheme and normalization
  description: PRD specifies circularity heatmap (red=low, green=high) but no details on colormap (e.g., matplotlib 'RdYlGn') or normalization range
  impact: May require color vision deficiency (CVD) friendly palette selection for accessibility

- area: Batch processing parallelization strategy
  description: PRD mandates sequential processing for VRAM safety but no guidance on potential parallelization across CPU cores for preprocessing steps
  impact: Missed opportunity for speedup in CLAHE, morphological operations, and metrics calculation (CPU-bound tasks)
