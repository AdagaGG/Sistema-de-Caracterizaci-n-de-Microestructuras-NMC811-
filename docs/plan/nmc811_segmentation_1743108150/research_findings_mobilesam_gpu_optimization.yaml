patterns_found:
- category: GPU memory management
  pattern: Sequential processing with explicit VRAM cleanup
  description: Process 1 image at a time, call torch.cuda.empty_cache() between images to release cached memory before loading next image tensor
  examples:
  - file: PyTorch Documentation
    location: /pytorch/pytorch
    snippet: |
      torch.cuda.empty_cache()  # Release cached memory
      print(f"Allocated: {torch.cuda.memory_allocated() / 1e9:.2f} GB")
      print(f"Cached: {torch.cuda.memory_reserved() / 1e9:.2f} GB")
  prevalence: common

- category: Inference optimization
  pattern: torch.inference_mode() + autocast with bfloat16/float16
  description: Disable gradient tracking and enable automatic mixed precision for GPU inference; bfloat16 preferred for numerical stability on Ampere+ GPUs, float16 fallback for older architectures
  examples:
  - file: SAM2 Documentation
    location: /facebookresearch/sam2
    snippet: |
      with torch.inference_mode(), torch.autocast("cuda", dtype=torch.bfloat16):
          predictor.set_image(image)
          masks, scores, _ = predictor.predict(point_coords=coords, point_labels=labels)
  prevalence: common

- category: Hybrid prompting workflow
  pattern: Automatic mask generation + manual refinement
  description: Use SAM2AutomaticMaskGenerator for initial grid-based segmentation, then SAM2ImagePredictor with point/box prompts to refine ambiguous boundaries or merged particles
  examples:
  - file: SAM2 Notebooks
    location: /idea-research/grounded-sam-2
    snippet: |
      # Automatic generation
      mask_generator = SAM2AutomaticMaskGenerator(model)
      masks = mask_generator.generate(image)
      
      # Manual refinement
      predictor = SAM2ImagePredictor(model)
      predictor.set_image(image)
      refined_masks, _, _ = predictor.predict(box=np.array([x1, y1, x2, y2]))
  prevalence: occasional

- category: 16-bit TIFF handling
  pattern: tifffile.imread() for bit depth preservation + normalization for OpenCV
  description: Read 16-bit TIFF with tifffile to preserve dynamic range, normalize to uint8/float32 for CLAHE preprocessing and morphological operations
  examples:
  - file: tifffile Documentation
    location: /cgohlke/tifffile
    snippet: |
      import tifffile
      img_16bit = tifffile.imread('fibsem.tif')  # Preserves uint16
      img_normalized = (img_16bit / img_16bit.max() * 255).astype('uint8')  # For OpenCV CLAHE
  prevalence: common

- category: Morphological refinement
  pattern: Opening operation (erosion + dilation) for particle separation
  description: Apply cv2.morphologyEx with cv2.MORPH_OPEN to binary masks to separate touching particles, use elliptical kernels for isotropic processing
  examples:
  - file: OpenCV Documentation
    location: /websites/opencv_4_x
    snippet: |
      kernel = cv2.getStructuringElement(cv2.MORPH_ELLIPSE, (5, 5))
      opening = cv2.morphologyEx(binary_mask, cv2.MORPH_OPEN, kernel)
  prevalence: common

- category: Batch CSV export
  pattern: pandas.concat() + DataFrame.to_csv() for multi-image aggregation
  description: Collect per-image DataFrames in a list, concatenate row-wise with pd.concat(), export consolidated CSV with index=False
  examples:
  - file: pandas Documentation
    location: /websites/pandas_pydata
    snippet: |
      all_results = []
      for img_path in image_paths:
          df_img = process_image(img_path)
          all_results.append(df_img)
      
      df_consolidated = pd.concat(all_results, axis=0, ignore_index=True)
      df_consolidated.to_csv('analisis_gold_standard.csv', index=False)
  prevalence: common

