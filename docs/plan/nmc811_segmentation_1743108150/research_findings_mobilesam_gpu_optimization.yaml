related_conventions:
  naming_patterns_in_domain: |
    - Image files: img_RDBS_{cycle}.tif (e.g., img_RDBS_0050.tif, img_RDBS_0485.tif)
    - Output CSV: analisis_gold_standard.csv (consolidated metrics from all 6 images)
    - Particle ID format: {image_name}_{particle_index} (e.g., RDBS_0050_001, RDBS_0050_002)
    - Metric columns: ID, Area_pixels, Area_um2, Perimeter_pixels, Perimeter_um, Circularity, EquivDiameter_um
    - Heatmap filenames: {image_name}_heatmap_circularity.png

  structure_of_domain: |
    Modular pipeline architecture with sequential stages:
    1. Preprocessing Module (TIFF loading, CLAHE, normalization)
    2. Segmentation Module (MobileSAM inference, hybrid prompting)
    3. Refinement Module (morphological operations)
    4. Metrics Module (contour extraction, geometric calculations)
    5. Validation Module (area/circularity/aspect ratio filters)
    6. Export Module (CSV consolidation, heatmap generation)
    7. GPU Memory Module (VRAM monitoring, cleanup orchestration)

  error_handling_in_domain: |
    - ERR_VRAM_001: GPU memory exceeded → trigger torch.cuda.empty_cache(), reduce batch size to 1 image
    - ERR_MASK_002: No valid particles detected → log warning, skip to next image
    - ERR_IO_003: TIFF read failure → verify file integrity with tifffile, check for corruption
    - ERR_METRIC_004: Perimeter is zero → skip particle in metrics calculation, log error

  testing_in_domain: |
    - Unit tests for circularity formula: C = 4πA/P² on synthetic circular and elongated shapes
    - Visual inspection of output images for merged particles in high-density regions
    - Manual particle count in 2 reference images vs automated detection (>90% threshold)
    - GPU memory monitoring during execution (<7.5GB peak usage verification)
    - End-to-end timing test: 6 images in <30 minutes on RTX 4060

  documentation_in_domain: |
    - PRD.yaml: Comprehensive product requirements with acceptance criteria, validation thresholds, and architectural decisions
    - Inline docstrings for all functions with parameter types and return value descriptions
    - README with conda environment setup instructions, CUDA driver requirements, and quickstart guide

