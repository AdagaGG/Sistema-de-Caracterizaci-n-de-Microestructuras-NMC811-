      Handle degenerate cases: zero perimeter (log error, set circularity=NaN), single-pixel particles, extreme aspect ratios.
      Structure output as pandas DataFrame with columns: [particle_id, area_px, area_um2, perimeter_um, circularity, equivalent_diameter_um, aspect_ratio, major_axis_um, minor_axis_um, image_source].
