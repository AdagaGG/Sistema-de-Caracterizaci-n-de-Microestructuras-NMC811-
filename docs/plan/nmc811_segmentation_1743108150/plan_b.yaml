  - id: extract-geometric-metrics
    title: Extract area, perimeter, circularity, diameter, aspect ratio per particle
    description: |
      Implement geometric metrics extraction from refined labeled masks.
      Create geometry_extractor.py: Use scikit-image regionprops for comprehensive property calculation.
      Extract metrics per particle: area (px and μm²), perimeter (μm), circularity (C=4πA/P²), equivalent diameter (μm), aspect ratio (major/minor axis).
