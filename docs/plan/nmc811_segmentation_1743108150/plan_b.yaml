plan_id: nmc811_segmentation_1743108150
objective: Develop a modular Computer Vision pipeline using MobileSAM and Python to automatically segment active material particles in 16-bit FIB-SEM .tif images, generating exportable geometric datasets to Excel for deep statistical analysis of cathode degradation
created_at: "2025-01-26T00:00:00Z"
created_by: gem-planner
status: pending_approval
research_confidence: high

plan_metrics:
  wave_1_task_count: 3
  total_dependencies: 11
  risk_score: medium

tldr: |
  Variant B emphasizes parallel early-stage execution with 3 independent wave-1 tasks (conda setup, preprocessing research, visualization design).
  Sequential processing architecture ensures VRAM safety (<7.5GB) by processing one image at a time with explicit cleanup.
  Hybrid prompting strategy (automatic + manual refinement) balances automation with researcher control for ambiguous particles.
  Combined validation filter (area + aspect ratio + edge exclusion) reduces false positives from noise/artifacts.
  Consolidated CSV export with circularity-based heatmap visualization enables rapid degradation pattern analysis.
  Risk mitigation: VRAM monitoring, parameter tuning tasks, comprehensive testing, and GPU fallback strategies.

open_questions:
  - Optimal CLAHE parameters (clip_limit, tile_grid_size) for FIB-SEM images require empirical tuning on gold_standard dataset
  - Structuring element shape/size for morphological opening needs validation (elliptical 3x3 vs 5x5 vs 7x7)
  - MobileSAM grid sampling density tradeoff between accuracy and <30min performance target
  - Manual refinement prompt storage strategy for reproducibility across research iterations

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: VRAM overflow crashes during MobileSAM inference despite sequential processing
      likelihood: medium
      impact: high
      mitigation: Implement aggressive GPU memory profiling in wave 2, add batch size reduction fallback, include torch.cuda.empty_cache() after each image, monitor peak VRAM with nvidia-smi logging

    - scenario: Morphological opening over-erodes small particles or fails to separate touching large particles
      likelihood: medium
      impact: high
      mitigation: Create parameter tuning task in wave 3 with visual validation on representative samples, implement configurable kernel size/shape, test range of structuring elements (3x3 to 7x7 elliptical)

    - scenario: Segmentation quality degrades on low-contrast or highly fractured particles leading to <90% detection rate
      likelihood: medium
      impact: critical
      mitigation: Allocate wave 2 task for CLAHE parameter optimization, implement quality metrics (IoU, Dice) for validation, design manual refinement workflow with clear UI prompts

    - scenario: Pipeline exceeds 30-minute performance target due to MobileSAM inference bottleneck
      likelihood: low
      impact: medium
      mitigation: Use bfloat16 mixed precision by default, profile inference times per image in wave 4, implement early warning if 5 images exceed 25 minutes, document optimization options (reduce grid density, skip manual refinement)

    - scenario: Edge particle exclusion removes too many valid samples reducing statistical power
      likelihood: low
      impact: medium
      mitigation: Generate exclusion statistics during validation task, implement configurable border buffer (0-10px), document tradeoff between sample size and measurement bias

  assumptions:
    - RTX 4060 GPU with 8GB VRAM is available and properly configured with CUDA 12.x drivers
    - Gold standard images (6x 16-bit TIFFs at ~3072x1024 resolution) are representative of target dataset
    - Pretrained MobileSAM checkpoint can be downloaded and stored locally without network restrictions
    - Researcher is available for manual refinement prompts during hybrid segmentation mode
    - Statistical analysis will be performed externally in Excel/R after CSV export
    - No concurrent GPU workloads will interfere with VRAM allocation during pipeline execution
    - Python 3.10+ conda environment can be created with write permissions to project directory
    - 16-bit TIFF bit depth is essential for segmentation quality (no 8-bit downsampling acceptable)

implementation_specification:
  code_structure: |
    Modular pipeline organized into 6 primary modules plus configuration/utilities:
    
    src/
      config/
        params.yaml                # Centralized CLAHE, morphology, validation thresholds
        mobilesam_config.yaml      # Model checkpoint path, grid density, IoU thresholds
      preprocessing/
        tiff_loader.py             # 16-bit TIFF loading with tifffile.imread()
        clahe_enhancer.py          # Adaptive histogram equalization with tunable parameters
      segmentation/
        mobilesam_wrapper.py       # Model initialization, VRAM management, inference loop
        mask_generator.py          # Automatic grid-based mask generation
        manual_refiner.py          # Point/box prompt interface for ambiguous particles
      postprocessing/
        morphology_ops.py          # Opening operations to separate particles
        edge_handler.py            # Border particle detection and exclusion
      metrics/
        geometry_extractor.py      # Area, perimeter, circularity, diameter calculation
        validation_filter.py       # Multi-criteria filtering (area + aspect ratio + edge)
      visualization/
        heatmap_generator.py       # Circularity-based color mapping (red=fractured, green=intact)
        overlay_renderer.py        # Mask overlay on original images
      export/
        csv_exporter.py            # Consolidated DataFrame export to analisis_gold_standard.csv
      utils/
        gpu_monitor.py             # VRAM profiling, torch.cuda.empty_cache() wrapper
        logger.py                  # Structured logging for debugging
      main.py                      # Orchestrator script for end-to-end pipeline

  affected_areas:
    - Gold standard image directory (read-only access to 6 .tif files)
    - Output directories for masks, visualizations, and CSV export (write access required)
    - Conda environment configuration (new environment creation)
    - GPU VRAM (managed by PyTorch, requires CUDA 12.x drivers)
    - Configuration files (YAML-based parameter storage)

  component_details:
    - component: TIFF Loader
      responsibility: Load 16-bit FIB-SEM images preserving bit depth without lossy conversion, handle potential file I/O errors, validate image dimensions and dtype
      interfaces:
        - load_image(filepath: str) -> np.ndarray[uint16]
        - validate_bit_depth(image: np.ndarray) -> bool

    - component: CLAHE Enhancer
      responsibility: Apply adaptive histogram equalization to compensate brightness gradients and enhance cracks, expose tunable clip_limit and tile_grid_size parameters
      interfaces:
        - enhance(image: np.ndarray[uint16], clip_limit: float, tile_grid_size: tuple) -> np.ndarray[uint8]
        - optimize_parameters(image_set: list) -> dict

    - component: MobileSAM Wrapper
      responsibility: Initialize pretrained MobileSAM model, manage CUDA device placement, implement sequential inference with VRAM cleanup between images, expose automatic and manual prompting modes
      interfaces:
        - load_model(checkpoint_path: str, device: str) -> SAM2Model
        - generate_masks_auto(image: np.ndarray) -> list[dict]
        - refine_mask_manual(image: np.ndarray, prompts: list) -> dict
        - cleanup_vram() -> None

    - component: Morphology Operations
      responsibility: Apply opening (erosion + dilation) to separate touching particles, support configurable structuring element shape and size
      interfaces:
        - apply_opening(mask: np.ndarray, kernel_shape: str, kernel_size: int) -> np.ndarray
        - tune_kernel_parameters(mask_set: list) -> dict

    - component: Geometry Extractor
      responsibility: Calculate area, perimeter, circularity (C=4πA/P²), equivalent diameter, aspect ratio per particle from refined masks, convert to physical units (μm) using 0.08431 μm/px scale
      interfaces:
        - extract_metrics(mask: np.ndarray, scale_factor: float) -> pd.DataFrame
        - calculate_circularity(area: float, perimeter: float) -> float

    - component: Validation Filter
      responsibility: Apply combined area thresholds [50-10000px], aspect ratio [0.25-4.0], edge particle exclusion, log rejection statistics
      interfaces:
        - filter_particles(df: pd.DataFrame, criteria: dict) -> pd.DataFrame
        - exclude_edge_particles(mask: np.ndarray, border_buffer: int) -> np.ndarray
        - generate_filter_stats(df_before: pd.DataFrame, df_after: pd.DataFrame) -> dict

    - component: Heatmap Generator
      responsibility: Generate circularity-based color-coded visualizations with red=low circularity (fractured) and green=high circularity (intact), overlay on original images
      interfaces:
        - create_heatmap(circularity_values: np.ndarray, colormap: str) -> np.ndarray
        - overlay_on_image(heatmap: np.ndarray, original: np.ndarray, alpha: float) -> np.ndarray

    - component: CSV Exporter
      responsibility: Consolidate metrics from all 6 images into single DataFrame, export to analisis_gold_standard.csv with proper column names and formatting
      interfaces:
        - consolidate_batch(dataframes: list[pd.DataFrame]) -> pd.DataFrame
        - export_csv(df: pd.DataFrame, output_path: str) -> None

  dependencies:
    - component: CLAHE Enhancer
      relationship: depends on TIFF Loader for 16-bit input arrays

    - component: MobileSAM Wrapper
      relationship: depends on CLAHE Enhancer for preprocessed input images

    - component: Morphology Operations
      relationship: depends on MobileSAM Wrapper for binary segmentation masks

    - component: Geometry Extractor
      relationship: depends on Morphology Operations for refined particle masks

    - component: Validation Filter
      relationship: depends on Geometry Extractor for raw metric DataFrames

    - component: Heatmap Generator
      relationship: depends on Validation Filter for circularity values of valid particles

    - component: CSV Exporter
      relationship: depends on Validation Filter for cleaned metric DataFrames from all images

  integration_points:
    - Sequential image processing loop: main.py iterates through gold_standard/*.tif files, invoking each module in pipeline order
    - GPU memory management: gpu_monitor.py integrates with MobileSAM Wrapper via torch.cuda.empty_cache() after each inference cycle
    - Configuration system: All tunable parameters loaded from YAML files in src/config/ at runtime
    - Logging: Structured logs written by logger.py to track preprocessing steps, VRAM usage, segmentation quality, and validation statistics
    - Error handling: Try-catch blocks in main.py with fallback strategies for VRAM overflow, corrupted TIFF files, and zero-perimeter particles

contracts:
  - from_task: setup-conda-environment
    to_task: integrate-mobilesam-model
    interface: Functional conda environment with PyTorch 2.x, torchvision, CUDA 12.x support, tifffile, opencv-python, scikit-image, pandas installed
    format: Conda environment accessible via 'conda activate nmc811_segmentation' with verified GPU availability (torch.cuda.is_available() == True)

  - from_task: implement-preprocessing-pipeline
    to_task: integrate-mobilesam-model
    interface: Preprocessed image arrays in uint8 format suitable for MobileSAM input (H, W, C) with normalized intensity range [0-255]
    format: NumPy ndarray with shape validation and dtype assertion

  - from_task: integrate-mobilesam-model
    to_task: implement-morphological-refinement
    interface: Binary segmentation masks as NumPy boolean arrays (H, W) with one mask per detected particle
    format: List of dict objects with keys 'segmentation' (binary mask), 'area' (pixel count), 'bbox' (x, y, w, h)

  - from_task: implement-morphological-refinement
    to_task: extract-geometric-metrics
    interface: Refined binary masks with separated particles, labeled image array for regionprops
    format: NumPy int32 labeled array where each connected component has unique integer ID (0=background)

  - from_task: extract-geometric-metrics
    to_task: implement-validation-filters
    interface: Raw geometric metrics DataFrame with columns [particle_id, area_px, area_um2, perimeter_um, circularity, equivalent_diameter_um, aspect_ratio, image_source]
    format: pandas DataFrame with numeric dtypes, NaN handling for degenerate cases (zero perimeter)

  - from_task: implement-validation-filters
    to_task: generate-heatmap-visualizations
    interface: Filtered DataFrame containing only valid particles passing all criteria (area, aspect ratio, edge exclusion)
    format: pandas DataFrame subset with validation_status flag and rejection_reason column

  - from_task: implement-validation-filters
    to_task: consolidate-csv-export
    interface: Batch of filtered DataFrames (one per image) ready for concatenation
    format: List of pandas DataFrames with consistent column schemas

  - from_task: implement-preprocessing-pipeline
    to_task: tune-clahe-parameters
    interface: CLAHE enhancement function accepting clip_limit and tile_grid_size as tunable parameters
    format: Callable function with signature enhance(image, clip_limit, tile_grid_size) -> enhanced_image

  - from_task: implement-morphological-refinement
    to_task: tune-morphology-parameters
    interface: Morphological opening function with configurable kernel shape and size
    format: Callable function with signature apply_opening(mask, kernel_shape, kernel_size) -> refined_mask

