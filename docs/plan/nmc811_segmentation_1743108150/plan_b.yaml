  - id: implement-validation-filters
    title: Apply combined area + aspect ratio + edge exclusion validation filters
    description: |
      Implement multi-criteria particle validation to reject noise and artifacts.
      Create validation_filter.py: Apply thresholds sequentially with logging of rejection statistics.
      Filter criteria (from task_clarifications and PRD):
        - Area range: [50, 10000] pixels (reject very small noise and large artifacts)
        - Aspect ratio range: [0.25, 4.0] (1:4 to 4:1, reject extreme needles and filaments)
        - Circularity: No minimum threshold (export all for posterior statistical filtering)
        - Edge exclusion: Already handled in morphological refinement task
      Implement filter_particles() function accepting DataFrame and criteria dict.
      Log rejection statistics: count and percentage per criterion, distribution of rejected values.
      Add validation_status flag and rejection_reason column to output DataFrame.
      Support configurable thresholds for future parameter tuning.
