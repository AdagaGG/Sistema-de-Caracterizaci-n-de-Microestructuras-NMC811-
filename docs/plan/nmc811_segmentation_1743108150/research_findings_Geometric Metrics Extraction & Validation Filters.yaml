related_conventions:
  naming_patterns_in_domain: |
    - Function naming: snake_case (calculate_circularity, filter_by_area, generate_heatmap)
    - Variable naming: Descriptive names for metrics (area_pixels, area_um2, perimeter_px, circularity_values)
    - Constants: UPPERCASE for thresholds (MIN_AREA_PX = 50, MAX_AREA_PX = 10000, MIN_ASPECT_RATIO = 0.25)
    - DataFrame columns: lowercase with underscores (particle_id, area_um2, equivalent_diameter_um, aspect_ratio)

  structure_of_domain: |
    Recommended modular structure:
    - src/metrics/geometric_extractor.py: Core metrics calculation (area, perimeter, circularity, aspect ratio, etc.)
    - src/filters/validation_filters.py: Multi-stage particle validation (area, aspect ratio, edge exclusion)
    - src/visualization/heatmap_generator.py: Circularity-based color mapping for degradation assessment
    - src/export/csv_exporter.py: DataFrame construction and CSV export with proper headers/units

  error_handling_in_domain: |
    - Division-by-zero protection for circularity (check perimeter > 0 before C = 4πA/P²)
    - Division-by-zero protection for aspect ratio (check minor_axis > 0 before ratio calculation)
    - Edge case handling for empty masks (no particles detected after segmentation)
    - Validation of input mask format (binary vs labeled, expected data type uint8/uint16)
    - NaN/Inf detection in metric arrays before DataFrame export

  testing_in_domain: |
    - Unit tests for circularity formula using synthetic shapes (perfect circle → C=1, square → C≈0.785)
    - Unit tests for aspect ratio calculation (square → 1.0, 4:1 rectangle → 0.25 or 4.0 depending on orientation)
    - Integration tests for validation filter pipeline (verify cascading thresholds correctly reject particles)
    - Regression tests comparing regionprops vs contour-based area/perimeter calculations (should match within tolerance)
    - Edge case tests for particles touching image borders (bbox coordinates at 0 or max dimensions)

  documentation_in_domain: |
    - Docstrings for all metric calculation functions specifying units (pixels vs μm) and formula references
    - Inline comments for circularity formula derivation (C = 4πA/P², perfect circle = 1.0)
    - README explaining validation threshold selection rationale (area range, aspect ratio limits)
    - CSV header documentation specifying physical units (um2 for area, um for diameter) and scale factor (0.08431 μm/px)

