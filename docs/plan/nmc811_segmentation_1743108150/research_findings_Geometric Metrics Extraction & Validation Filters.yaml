open_questions:
  - question: Should circularity calculation use contour-based (cv2.arcLength) or regionprops-based (region.perimeter) perimeter?
    context: |
      Both OpenCV and scikit-image provide perimeter calculations, but implementations may differ slightly 
      (pixel-based chain code vs mathematical approximation). Need to verify consistency and select one 
      method for reproducibility. PRD acceptance criterion specifies C = 4πA/P² formula but doesn't mandate 
      specific perimeter calculation method

  - question: What tolerance should be used for particles with zero or near-zero perimeter?
    context: |
      Division-by-zero protection needed for circularity formula. If perimeter = 0 (degenerate case) 
      or very small (single-pixel artifacts), should particles be rejected during validation or assigned 
      circularity = 0? Affects error handling strategy and downstream statistical analysis

  - question: Should aspect ratio be calculated as (minor/major) or (width/height) from bounding box?
    context: |
      Two common patterns: (1) ratio of fitted ellipse axes (region.axis_minor_length / region.axis_major_length), 
      (2) ratio of bounding box dimensions (w/h or h/w). PRD specifies ratio range [0.25, 4.0] suggesting 
      need for min/max normalization regardless of orientation. Need to clarify which method aligns with 
      research domain conventions

  - question: How should edge particles be precisely defined for exclusion?
    context: |
      PRD specifies exclude_edge_particles: true but doesn't define "touching" criteria. Options: 
      (1) any pixel of particle touches border, (2) bounding box touches border, (3) centroid within 
      margin of border. Different definitions affect particle count and statistical analysis outcomes

  - question: Should equivalent diameter calculation use area-based (4A/π)^0.5 or perimeter-based formulas?
    context: |
      scikit-image provides equivalent_diameter_area (based on area of circle with same area as region). 
      Alternative formulas exist using perimeter. PRD acceptance criteria mention "Equivalent Diameter" 
      but don't specify calculation method. Need to verify which metric is standard in FIB-SEM particle analysis

gaps:
  - area: Physical unit conversion consistency
    description: |
      PRD specifies 0.08431 μm/px scale factor but doesn't clarify if this applies uniformly to all 
      6 gold_standard images or varies per image. Need to verify microscope calibration metadata 
      from TIFF headers to ensure accurate μm² calculations
    impact: |
      Incorrect scale factor propagates to all exported metrics (area_um2, equivalent_diameter_um), 
      invalidating statistical analysis of absolute particle sizes. Critical for degradation quantification

  - area: Heatmap color gradient specification
    description: |
      PRD specifies red=low circularity, green=high circularity but doesn't define intermediate 
      gradient (linear RGB interpolation, HSV-based, perceptually uniform colormap). Custom LUT 
      implementation needed - standard cv2.COLORMAP_* may not provide intuitive red-green mapping
    impact: |
      Affects visual interpretability of degradation assessment. Non-linear or perceptually non-uniform 
      gradient may mislead manual inspection of fractured vs intact particles

  - area: Consolidated CSV schema for batch processing
    description: |
      PRD mentions "analisis_gold_standard.csv" with consolidated metrics from 6 images but doesn't 
      specify schema details (include image source column? particle ID uniqueness across images? 
      aggregation vs per-particle rows?). Need to define DataFrame structure for multi-image batches
    impact: |
      Ambiguous schema complicates statistical analysis pipeline. If particle IDs are not unique 
      across images, downstream grouping/filtering by image source becomes error-prone

  - area: Circularity threshold for posterior filtering
    description: |
      PRD explicitly states "No minimum circularity threshold (export all for posterior filtering)" 
      but doesn't provide guidance on typical circularity distribution in NMC811 cathode particles. 
      Without domain knowledge, difficult to validate if calculated circularity values are physically plausible
    impact: |
      No impact on implementation (export all as specified) but limits ability to detect 
      systematic errors in circularity calculation. Validation requires manual inspection of 
      first results or comparison with literature values

  - area: Morphological refinement interaction with metrics
    description: |
      PRD specifies morphological opening operations (erosion + dilation) to separate touching particles 
      in upstream segmentation module. Unclear if metrics should be calculated on pre-opening or post-opening 
      masks. Opening operations alter perimeter/area, affecting circularity calculations
    impact: |
      If metrics calculated on pre-opening masks, particles may appear merged (lower circularity). 
      If calculated post-opening, small particles may disappear (area reduction). Need to clarify 
      pipeline ordering: segmentation → opening → metrics vs segmentation → metrics → opening
