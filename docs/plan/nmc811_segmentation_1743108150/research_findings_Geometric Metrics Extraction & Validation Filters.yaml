patterns_found:
  - category: metrics_calculation
    pattern: scikit-image regionprops-based extraction
    description: |
      Industry-standard pattern using skimage.measure.regionprops() or regionprops_table() to extract 
      comprehensive geometric metrics from labeled binary masks. Provides direct access to area, perimeter, 
      eccentricity, solidity, extent, equivalent_diameter, orientation, axis_major_length, axis_minor_length, 
      and bbox properties. Returns structured data ready for pandas DataFrame export
    examples:
      - file: External scikit-image documentation
        location: skimage.measure.regionprops API
        snippet: |
          from skimage.measure import regionprops, label
          labeled_mask = label(binary_mask)
          regions = regionprops(labeled_mask)
          for region in regions:
              area = region.area  # pixels
              perimeter = region.perimeter  # pixels
              eccentricity = region.eccentricity  # 0-1
              equivalent_diameter = region.equivalent_diameter_area
              major_axis = region.axis_major_length
              minor_axis = region.axis_minor_length
    prevalence: common

  - category: metrics_calculation
    pattern: OpenCV contour-based extraction
    description: |
      Alternative pattern using OpenCV's contour detection for area/perimeter calculation. 
      Suitable when working directly with binary masks without labeled regions. 
      Requires cv2.findContours → iterate contours → extract metrics per contour. 
      Commonly used for circularity calculation with formula C = 4πA/P²
    examples:
      - file: External opencv-python documentation
        location: cv2.findContours + cv2.contourArea workflow
        snippet: |
          import cv2
          import numpy as np
          contours, _ = cv2.findContours(binary_mask, cv2.RETR_EXTERNAL, cv2.CHAIN_APPROX_SIMPLE)
          for contour in contours:
              area = cv2.contourArea(contour)
              perimeter = cv2.arcLength(contour, closed=True)
              circularity = 4 * np.pi * area / (perimeter ** 2) if perimeter > 0 else 0
              x, y, w, h = cv2.boundingRect(contour)
              aspect_ratio = float(w) / h if h > 0 else 0
    prevalence: common

  - category: validation_filtering
    pattern: Multi-criteria particle validation filter
    description: |
      Sequential filtering pipeline applying multiple thresholds to reject noise, artifacts, and 
      edge particles. Typical stages: (1) Area filtering (min/max thresholds), (2) Aspect ratio 
      filtering (reject extreme elongations), (3) Edge particle exclusion (bbox touching borders), 
      (4) Optional morphological criteria (solidity, convexity). Each stage removes particles failing 
      the criterion before proceeding to next stage
    examples:
      - file: Conceptual pattern from microscopy analysis workflows
        location: N/A
        snippet: |
          # Stage 1: Area filtering
          valid_particles = [r for r in regions if 50 <= r.area <= 10000]
          
          # Stage 2: Aspect ratio filtering
          valid_particles = [r for r in valid_particles 
                             if 0.25 <= (r.axis_minor_length / r.axis_major_length) <= 4.0]
          
          # Stage 3: Edge particle exclusion
          h, w = binary_mask.shape
          valid_particles = [r for r in valid_particles 
                             if not (r.bbox[0] == 0 or r.bbox[1] == 0 
                                     or r.bbox[2] >= h or r.bbox[3] >= w)]
    prevalence: common

  - category: validation_filtering
    pattern: Small object removal via scipy.ndimage.label + bincount
    description: |
      Post-segmentation cleanup using connected component labeling followed by size-based filtering. 
      Uses scipy.ndimage.label to identify components, numpy.bincount to compute sizes, 
      then creates boolean mask to retain only objects exceeding size threshold. 
      Alternative: skimage.morphology.remove_small_objects (deprecated min_size → area_threshold parameter)
    examples:
      - file: External scikit-image tutorial documentation
        location: skimage tutorial_segmentation.rst
        snippet: |
          import scipy as sp
          import numpy as np
          label_objects, nb_labels = sp.ndimage.label(binary_mask)
          sizes = np.bincount(label_objects.ravel())
          mask_sizes = sizes > 50  # minimum area threshold
          mask_sizes[0] = 0  # exclude background
          cleaned_mask = mask_sizes[label_objects]
    prevalence: common

  - category: visualization
    pattern: Circularity heatmap via custom color mapping
    description: |
      Visualization strategy mapping continuous circularity metric (0-1 range) to red-green color gradient 
      for visual quality assessment. Red indicates low circularity (fractured/degraded particles), 
      green indicates high circularity (intact particles). Implementation: normalize circularity to 0-255, 
      create custom LUT [red→yellow→green], apply via cv2.applyColorMap or manual indexing
    examples:
      - file: Conceptual pattern from particle degradation analysis
        location: N/A
        snippet: |
          import cv2
          import numpy as np
          # Normalize circularity to 0-255 range
          circularity_values = np.array([region.circularity for region in regions])
          circularity_norm = ((circularity_values - circularity_values.min()) / 
                              (circularity_values.max() - circularity_values.min()) * 255).astype(np.uint8)
          
          # Create custom red-green LUT (256 entries)
          lut = np.zeros((256, 1, 3), dtype=np.uint8)
          lut[:, 0, 0] = np.linspace(255, 0, 256)  # Red: high→low
          lut[:, 0, 1] = np.linspace(0, 255, 256)  # Green: low→high
          lut[:, 0, 2] = 0  # Blue: constant zero
          
          # Apply colormap to grayscale circularity image
          heatmap = cv2.applyColorMap(circularity_image, lut)
    prevalence: occasional

  - category: structure
    pattern: DataFrame export for statistical analysis
    description: |
      Conversion of geometric metrics to pandas DataFrame for CSV export and posterior statistical analysis. 
      Two approaches: (1) Manual dict assembly per particle, (2) skimage.measure.regionprops_table() 
      which directly returns dict compatible with pd.DataFrame(). Include particle ID, spatial coordinates 
      (centroid), all metrics, and image source identifier for batch processing
    examples:
      - file: Conceptual pattern from batch image analysis pipelines
        location: N/A
        snippet: |
          import pandas as pd
          from skimage.measure import regionprops_table
          
          # Approach 1: Manual assembly
          data = []
          for idx, region in enumerate(regions):
              data.append({
                  'particle_id': idx + 1,
                  'area_px': region.area,
                  'area_um2': region.area * (0.08431 ** 2),
                  'perimeter_px': region.perimeter,
                  'circularity': 4 * np.pi * region.area / (region.perimeter ** 2),
                  'equivalent_diameter_um': region.equivalent_diameter_area * 0.08431,
                  'aspect_ratio': region.axis_minor_length / region.axis_major_length,
                  'centroid_x': region.centroid[1],
                  'centroid_y': region.centroid[0],
                  'image_source': image_filename
              })
          df = pd.DataFrame(data)
          
          # Approach 2: regionprops_table (faster, less flexible)
          props = regionprops_table(labeled_mask, properties=['area', 'perimeter', 'eccentricity'])
          df = pd.DataFrame(props)
    prevalence: common

