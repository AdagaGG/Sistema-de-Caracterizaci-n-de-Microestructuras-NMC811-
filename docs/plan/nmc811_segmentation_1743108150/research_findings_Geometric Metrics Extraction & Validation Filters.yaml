tldr: |
  - This is a greenfield project with no existing codebase; research focused on industry-standard patterns for geometric metrics extraction in Python-based particle analysis pipelines
  - Best practice: Use scikit-image regionprops() for comprehensive metric calculation (area, perimeter, eccentricity, solidity, extent, equivalent_diameter, orientation, major/minor axes) from labeled masks
  - OpenCV contour-based approach (cv2.findContours + cv2.contourArea + cv2.arcLength) suitable for circularity calculation with formula C = 4πA/P²
  - Multi-stage validation filter architecture recommended: (1) area thresholds [50-10000 px], (2) aspect ratio filtering [0.25-4.0], (3) edge particle exclusion, (4) optional morphological cleanup
  - Heatmap visualization via cv2.applyColorMap with normalized circularity values mapped to custom red-green LUT for degradation assessment

