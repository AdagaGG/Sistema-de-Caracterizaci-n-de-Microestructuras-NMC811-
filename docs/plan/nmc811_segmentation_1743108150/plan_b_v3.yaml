plan_id: nmc811_segmentation_1743108150
objective: Develop a modular Computer Vision pipeline using MobileSAM and Python to automatically segment active material particles in 16-bit FIB-SEM .tif images, generating exportable geometric datasets to Excel for deep statistical analysis of cathode degradation
created_at: "2025-01-26T00:00:00Z"
created_by: gem-planner
status: pending_approval
research_confidence: high

plan_metrics:
  wave_1_task_count: 3
  total_dependencies: 37
  risk_score: medium

tldr: |
  Plan B v2 preserves the same objective and constraints while correcting reviewer failures.
  Oversized tasks were split into atomic units (<=300 estimated_lines): MobileSAM integration, orchestrator, and documentation.
  PRD error codes are now explicitly implemented and tested end-to-end:
  - ERR_VRAM_001 (segmentation VRAM overflow)
  - ERR_MASK_002 (no valid particles after filters)
  - ERR_IO_003 (16-bit TIFF read failure)
  - ERR_METRIC_004 (zero-perimeter circularity failure)
  DAG validity is preserved and early parallelism remains high with 3 independent wave-1 tasks.

open_questions:
  - Optimal CLAHE parameters (clip_limit, tile_grid_size) for FIB-SEM images require empirical tuning on gold_standard dataset
  - Structuring element shape/size for morphological opening needs validation (elliptical 3x3 vs 5x5 vs 7x7)
  - MobileSAM grid sampling density tradeoff between accuracy and <30min performance target
  - Manual refinement prompt storage strategy for reproducibility across research iterations

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: VRAM overflow during segmentation still appears under dense masks despite sequential processing
      likelihood: medium
      impact: high
      mitigation: Enforce per-image cleanup, peak VRAM telemetry, and deterministic ERR_VRAM_001 emission with fallback policy
    - scenario: Validation thresholds remove all particles on low-contrast images
      likelihood: medium
      impact: high
      mitigation: Log threshold decisions, capture rejection statistics, emit ERR_MASK_002 with PRD message, and support parameter rollback
    - scenario: Circularity computation crashes on degenerate contours
      likelihood: low
      impact: medium
      mitigation: Guard perimeter==0 path and emit ERR_METRIC_004 while continuing pipeline execution
  assumptions:
    - RTX 4060 GPU with 8GB VRAM is available and properly configured with CUDA 12.x drivers
    - Gold standard images (6x 16-bit TIFFs at ~3072x1024 resolution) are representative of target dataset
    - Pretrained MobileSAM checkpoint is available locally
    - Sequential one-image-at-a-time processing is required and preferred over multi-image batching

implementation_specification:
  code_structure: |
    src/
      config/
        params.yaml
        mobilesam_config.yaml
      preprocessing/
        tiff_loader.py
        clahe_enhancer.py
      segmentation/
        mobilesam_wrapper.py
        mask_generator.py
        vram_controls.py
        manual_refiner.py
      postprocessing/
        morphology_ops.py
        edge_handler.py
      metrics/
        geometry_extractor.py
        validation_filter.py
      visualization/
        heatmap_generator.py
        overlay_renderer.py
      export/
        csv_exporter.py
      pipeline/
        orchestrator_engine.py
      utils/
        error_codes.py
        logger.py
      main.py
  affected_areas:
    - docs/PRD.yaml (error code alignment as source of truth)
    - src/preprocessing
    - src/segmentation
    - src/postprocessing
    - src/metrics
    - src/visualization
    - src/export
    - src/pipeline
    - docs/
  component_details:
    - component: Error Code Catalog
      responsibility: Provide canonical PRD-aligned code/message map and exception helpers
      interfaces:
        - get_error(code: str) -> dict
        - raise_prd_error(code: str, context: dict) -> Exception
    - component: Segmentation Engine
      responsibility: Generate particle masks with MobileSAM and enforce VRAM-safe inference loop
      interfaces:
        - generate_masks_auto(image: ndarray) -> list[dict]
        - refine_masks_manual(image: ndarray, prompts: list) -> list[dict]
    - component: Validation and Metrics
      responsibility: Extract geometric metrics, apply filters, and emit deterministic failures on invalid states
      interfaces:
        - extract_metrics(mask_labels: ndarray) -> DataFrame
        - filter_particles(df: DataFrame, criteria: dict) -> DataFrame
    - component: Pipeline Orchestrator
      responsibility: Execute state-machine order per image and aggregate batch outputs
      interfaces:
        - run_batch(input_dir: str, output_dir: str, config: dict) -> dict
  dependencies:
    - component: Segmentation Engine
      relationship: depends on preprocessing output and error-code catalog
    - component: Morphology + Metrics
      relationship: depends on segmentation mask contract
    - component: Validation + Export + Visualization
      relationship: depends on metrics output contract
    - component: Orchestrator
      relationship: composes all modules and handles PRD error propagation/reporting
  integration_points:
    - Sequential image processing loop in orchestrator (raw -> preprocessed -> segmented -> refined -> analyzed -> exported)
    - GPU memory safety hooks after each image (cleanup + telemetry)
    - PRD error mapping integration: ERR_VRAM_001, ERR_MASK_002, ERR_IO_003, ERR_METRIC_004 emitted by owning modules and asserted by tests

