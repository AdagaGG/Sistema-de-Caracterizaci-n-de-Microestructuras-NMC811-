plan_id: nmc811_segmentation_1743108150
objective: Develop a modular Computer Vision pipeline using MobileSAM and Python to automatically segment active material particles in 16-bit FIB-SEM .tif images, generating exportable geometric datasets to Excel for deep statistical analysis of cathode degradation
focus_area: Image Preprocessing & Morphological Operations
created_at: "2026-03-26T14:39:18Z"
created_by: gem-researcher
status: completed

tldr: |
  - NO existing codebase found; this is a greenfield project requiring complete implementation from scratch
  - 6 gold standard 16-bit .tif FIB-SEM images located at gold_standard/ directory (img_RDBS_0050 to img_RDBS_0485)
  - PRD defines complete preprocessing workflow: CLAHE → MobileSAM → Morphological Refinement → Geometric Metrics → Validation → Export
  - Key libraries identified: tifffile (16-bit preservation), OpenCV (CLAHE, morphology), scikit-image (clear_border, regionprops), MobileSAM (segmentation), pandas (CSV export)
  - Combined validation filter required: area [50-10000px] + aspect_ratio [0.25-4.0] + circularity (no minimum) + exclude_edge_particles=true
  - Critical preprocessing steps: (1) 16-bit TIFF loading without conversion, (2) CLAHE with clip_limit & tile_grid_size tuning, (3) Morphological opening (erosion→dilation) to separate touching particles
  - Edge particle exclusion via scikit-image clear_border or manual border detection with numpy mask operations
  - GPU memory constraint: RTX 4060 8GB VRAM requires sequential processing with cleanup between images

