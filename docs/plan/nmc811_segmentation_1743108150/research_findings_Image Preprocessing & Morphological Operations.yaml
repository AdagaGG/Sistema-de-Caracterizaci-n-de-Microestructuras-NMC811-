    Multi-pass hybrid research approach for complex task:
    - Pass 1: Repository structure analysis (glob for .py, .yaml, .tif files) + PRD deep dive for scope/constraints
    - Pass 2: External documentation research via Context7 for OpenCV, scikit-image, tifffile, MobileSAM, pandas, numpy libraries
    - Pass 3: Pattern synthesis for preprocessing pipelines, morphological operations, edge handling, validation filters
    - Tools used: view (PRD), glob (file discovery), context7-resolve-library-id, context7-query-docs (external docs), sequential reasoning for complex domain synthesis
    - No codebase available; research focused on best practices from official library documentation
  scope: |
    Comprehensive exploration of Image Preprocessing & Morphological Operations domain for particle segmentation pipeline.
    Coverage: 16-bit TIFF I/O, CLAHE adaptive equalization, morphological operations (erosion, dilation, opening, closing),
    edge particle detection/exclusion, validation filters (area, circularity, aspect ratio), contour analysis, geometric measurements.
    Excluded from scope: MobileSAM model training, 3D reconstruction, cloud processing, real-time video, hyperparameter autotuning.
  confidence: high
  coverage: 100

