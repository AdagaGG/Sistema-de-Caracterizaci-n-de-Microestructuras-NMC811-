    location: External library (OpenCV)
    usage_pattern: |
      Create CLAHE object with tunable parameters:
      clahe = cv.createCLAHE(clipLimit=2.0, tileGridSize=(8,8))
      enhanced = clahe.apply(image)

  - interface: cv.morphologyEx
    location: External library (OpenCV)
    usage_pattern: |
      Apply morphological opening:
      kernel = cv.getStructuringElement(cv.MORPH_RECT, (5, 5))
      refined_mask = cv.morphologyEx(binary_mask, cv.MORPH_OPEN, kernel)

  - interface: cv.findContours
    location: External library (OpenCV)
    usage_pattern: |
      Extract contours from binary mask:
      contours, _ = cv.findContours(binary_mask, cv.RETR_LIST, cv.CHAIN_APPROX_NONE)

  - interface: cv.contourArea / cv.arcLength / cv.boundingRect
    location: External library (OpenCV)
    usage_pattern: |
      Measure geometric properties:
      area = cv.contourArea(cnt)
      perimeter = cv.arcLength(cnt, True)
      x, y, w, h = cv.boundingRect(cnt)

  - interface: numpy boolean indexing
    location: External library (numpy)
    usage_pattern: |
      Filter particles by validation criteria:
      valid_mask = (areas >= 50) & (areas <= 10000) & (aspect_ratios >= 0.25) & (aspect_ratios <= 4.0)

  - interface: pandas.DataFrame.to_csv
    location: External library (pandas)
    usage_pattern: |
      Export consolidated metrics:
      df.to_csv("analisis_gold_standard.csv", index=False)

  data_flow_involving_domain: |
    1. Input: 16-bit TIFF images (gold_standard/*.tif) → tifffile.imread → numpy array (uint16)
    2. Preprocessing: numpy array → cv.createCLAHE().apply() → enhanced array
    3. Segmentation: enhanced array → MobileSAM → binary masks (uint8)
    4. Morphological Refinement: binary masks → cv.morphologyEx(MORPH_OPEN) → refined masks
    5. Edge Exclusion: refined masks → numpy border detection + masking → edge-filtered masks
    6. Contour Extraction: edge-filtered masks → cv.findContours → list of contours
    7. Geometric Measurement: contours → cv.contourArea/arcLength/boundingRect → area, perimeter, aspect_ratio
    8. Circularity Calculation: area, perimeter → 4πA/P² → circularity metric
    9. Validation Filtering: metrics → numpy boolean indexing → valid particles only
    10. Unit Conversion: pixel metrics → multiply by 0.08431 μm/px scale → physical units
    11. Export: pandas DataFrame → to_csv → analisis_gold_standard.csv

  key_relationships_to_domain:
  - from: Image Input Module
    to: CLAHE Preprocessing Module
    relationship: provides 16-bit numpy array

  - from: CLAHE Preprocessing Module
    to: MobileSAM Segmentation Engine
    relationship: provides contrast-enhanced image

  - from: MobileSAM Segmentation Engine
    to: Morphological Refinement Pipeline
    relationship: provides binary segmentation masks

  - from: Morphological Refinement Pipeline
    to: Geometric Metrics Extractor
    relationship: provides refined particle masks with separated boundaries

  - from: Geometric Metrics Extractor
    to: Particle Validation Filter
    relationship: provides raw geometric measurements (area, perimeter, circularity, aspect_ratio)

  - from: Particle Validation Filter
    to: CSV Export Module
    relationship: provides filtered, valid particle metrics ready for export

