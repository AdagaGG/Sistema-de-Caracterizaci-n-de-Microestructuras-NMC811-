open_questions:
- question: What are the optimal CLAHE parameters (clip_limit, tile_grid_size) for FIB-SEM NMC811 images?
  context: |
    PRD mentions CLAHE for brightness gradient compensation and crack enhancement but does not specify parameters.
    Research shows default clip_limit=40.0, tile_grid_size=(8,8) in OpenCV, but microscopy images may require tuning.
    Need empirical testing on gold_standard images to determine optimal settings.

- question: What structuring element shape and size should be used for morphological opening?
  context: |
    PRD specifies opening operations to separate adjacent particles but does not define kernel parameters.
    Options: rectangular (MORPH_RECT), elliptical (MORPH_ELLIPSE), cross (MORPH_CROSS) with varying sizes (3x3, 5x5, 7x7).
    Larger kernels provide stronger separation but may erode small particles. Requires experimentation.

- question: How should circularity be exported when no minimum threshold is applied?
  context: |
    PRD sets circularity_min=null (no minimum threshold) to export all particles for posterior filtering.
    Fractured particles may have circularity < 0.5. Need to confirm if negative circularity values (from degenerate
    contours with perimeter=0) should be handled specially (e.g., set to 0 or NaN).

- question: Should edge particle exclusion occur before or after morphological refinement?
  context: |
    Task clarification specifies "Exclude particles touching image borders" but does not define pipeline order.
    Option 1: Exclude before morphology (cleaner processing, fewer operations).
    Option 2: Exclude after morphology (more accurate boundary detection on refined masks).
    Option 2 recommended to ensure proper particle boundary refinement before border check.

- question: What is the expected particle size distribution in gold_standard images?
  context: |
    Validation threshold area_range_pixels=[50, 10000] spans 200x range. Unknown if distribution is uniform or
    skewed toward small/large particles. Impacts validation filter effectiveness and potential false positive rate.
    Manual particle counting on 2 reference images (per acceptance criteria) should reveal distribution.

- question: How should multi-component connected regions after opening be handled?
  context: |
    Morphological opening may split particles into multiple components. Should these be:
    (a) Treated as separate particles (increases particle count, may violate >90% detection criterion),
    (b) Re-merged using connected component labeling (complex, may reintroduce touching particles),
    (c) Handled case-by-case with manual refinement (hybrid approach per PRD)?
    Need clarification on expected behavior.

- question: What physical unit conversion should be applied to area (μm²)?
  context: |
    PRD specifies 0.08431 μm/px scale for linear measurements (perimeter, diameter). For area, conversion requires
    squaring the scale factor: area_um2 = area_px * (0.08431)². Need confirmation this is the intended calculation.

gaps:
- area: No existing Python codebase
  description: |
    Repository contains only PRD and gold_standard images. No preprocessing module, morphology module, or any
    implementation code exists. Entire pipeline must be built from scratch.
  impact: |
    Complete greenfield implementation required. Research provides architectural guidance and library recommendations
    but no reference implementation to adapt. Increases development effort and testing complexity.

- area: MobileSAM integration patterns not documented
  description: |
    Research covers MobileSAM basic usage (SamPredictor, SamAutomaticMaskGenerator) but not hybrid automatic + manual
    refinement workflow, VRAM optimization strategies, or sequential processing with GPU cleanup between images.
  impact: |
    Segmentation module implementation will require additional research into MobileSAM advanced features and
    GPU memory management patterns. May impact preprocessing module design if segmentation output format differs
    from expectations.

- area: Actual gold_standard image properties unknown
  description: |
    Research identified 6 .tif files but did not inspect image dimensions, actual bit depth, presence of brightness
    gradients, particle density, or crack visibility. These properties impact CLAHE parameter tuning and morphology
    kernel sizing.
  impact: |
    Preprocessing and morphology parameter selection will require exploratory data analysis (EDA) phase. Cannot
    finalize implementation until image characteristics are analyzed. Recommend initial EDA to measure image
    statistics (histogram, gradient magnitude, particle count estimate).

- area: Validation threshold justification not provided
  description: |
    PRD specifies area_range_pixels=[50, 10000] and aspect_ratio_range=[0.25, 4.0] but does not explain how these
    thresholds were determined. Unknown if based on domain knowledge, pilot study, or arbitrary selection.
  impact: |
    Without threshold justification, cannot assess if values are appropriate for NMC811 cathode particles. May need
    iterative refinement after initial pipeline runs. Risk of over-filtering (missing valid particles) or
    under-filtering (including noise/artifacts).

- area: Performance benchmarking baseline missing
  description: |
    PRD requires <30 minutes for 6 images on RTX 4060 but does not provide timing breakdown (preprocessing, segmentation,
    morphology, metrics). Unknown which stage is bottleneck.
  impact: |
    Optimization efforts may target wrong pipeline stage. Recommend profiling each module (preprocessing ~1-2 min,
    segmentation ~20-25 min, morphology ~1-2 min, metrics <1 min per image) to identify bottlenecks and guide
    optimization priorities.

- area: Error recovery strategies undefined
  description: |
    PRD defines error codes (ERR_VRAM_001, ERR_MASK_002, ERR_IO_003, ERR_METRIC_004) but not recovery actions.
    Unknown if pipeline should halt on error, skip problematic image, or retry with adjusted parameters.
  impact: |
    Batch processing of 6 images may fail completely if single image encounters error. Recommend implementing
    per-image error handling with logging and optional skip/continue behavior for robustness.
