related_conventions:
  naming_patterns_in_domain: |
    - Image files: snake_case with prefix pattern (img_RDBS_NNNN.tif)
    - Module names: descriptive_snake_case (clahe_preprocessing_module, morphological_refinement_pipeline)
    - Configuration keys: snake_case (area_range_pixels, clip_limit, tile_grid_size, exclude_edge_particles)
    - State machine states: lowercase (raw, preprocessed, segmented, refined, analyzed, exported)
    - Metric columns: snake_case with units (area_px, perimeter_px, diameter_um, circularity)

  structure_of_domain: |
    Recommended modular pipeline structure (to be implemented):
    - preprocessing/
      - tiff_loader.py (16-bit TIFF I/O)
      - clahe_enhancer.py (CLAHE adaptive equalization)
    - morphology/
      - opening_refiner.py (erosion + dilation operations)
      - edge_excluder.py (border particle removal)
      - kernel_utils.py (structuring element generation)
    - geometry/
      - contour_analyzer.py (findContours + metric calculation)
      - circularity_calculator.py (4πA/P² formula)
      - unit_converter.py (pixel to μm conversion)
    - validation/
      - particle_filter.py (combined area + aspect_ratio + circularity filters)
    - export/
      - csv_exporter.py (pandas DataFrame consolidation)

  error_handling_in_domain: |
    PRD defines error codes for common failures:
    - ERR_VRAM_001: GPU memory exceeded during segmentation
    - ERR_MASK_002: No valid particles detected after filtering (check thresholds)
    - ERR_IO_003: Failed to read 16-bit TIFF (verify tifffile library version)
    - ERR_METRIC_004: Circularity calculation failed (perimeter=0, check contour extraction)
    
    Recommended preprocessing-specific error handling:
    - Validate 16-bit dtype after loading (assert image.dtype == np.uint16)
    - Check CLAHE parameters (clip_limit > 0, tile_grid_size valid)
    - Verify kernel size for morphology (odd dimensions, positive values)
    - Handle zero perimeter edge case in circularity (return 0 or NaN)
    - Validate area/aspect_ratio ranges before filtering

  testing_in_domain: |
    PRD acceptance criteria define test scenarios:
    - Unit test: Circularity formula on synthetic shapes (circle=1.0, square≈0.785)
    - Integration test: 6 gold_standard images processed without VRAM overflow (<7.5GB peak)
    - Visual test: Segmentation masks separate adjacent particles in high-density regions
    - Quantitative test: CSV contains >90% of manually counted particles (2 reference images)
    - Performance test: Pipeline completes 6 images in <30 minutes on RTX 4060
    
    Recommended preprocessing tests:
    - Test 16-bit preservation: Load TIFF → verify dtype=uint16, no clipping
    - Test CLAHE enhancement: Verify histogram spread increases, gradients reduced
    - Test morphological opening: Verify separation of synthetic touching circles
    - Test edge exclusion: Verify particles on border removed, interior particles retained
    - Test validation filter: Verify particles outside thresholds rejected

  documentation_in_domain: |
    No existing documentation (greenfield project). Recommended:
    - Function docstrings: Parameters (types, ranges), returns, raises (error codes from PRD)
    - Configuration comments: Explain CLAHE parameters (clip_limit impact, tile_grid_size tradeoffs)
    - Pipeline flowcharts: Visualize state transitions (raw → preprocessed → segmented → refined → analyzed → exported)
    - Parameter tuning guides: Document impact of kernel size, CLAHE settings, validation thresholds on results

