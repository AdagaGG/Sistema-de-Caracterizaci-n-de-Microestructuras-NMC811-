domain_security_considerations:
  sensitive_areas:
  - area: 16-bit TIFF file loading
    location: Image Input Module
    concern: |
      Incorrect bit-depth handling could expose system to integer overflow vulnerabilities if external libraries
      mishandle uint16 data. Use tifffile (trusted library) instead of custom parsers.

  - area: File path handling for batch processing
    location: Image Input Module, CSV Export Module
    concern: |
      Processing multiple files from gold_standard/ directory requires path validation to prevent directory traversal.
      Use os.path.abspath() and verify files exist within expected directory.

  - area: GPU memory management
    location: MobileSAM Segmentation Engine (indirectly impacts morphology)
    concern: |
      VRAM overflow (>8GB) could crash pipeline. Implement torch.cuda.empty_cache() between images and monitor memory
      usage. ERR_VRAM_001 error code defined for this failure mode.

  authentication_patterns_in_domain: Not applicable (offline local processing)

  authorization_patterns_in_domain: Not applicable (single-user research tool)

  data_validation_in_domain: |
    - Input validation: Verify .tif extension, check file exists, confirm 16-bit dtype after loading
    - Parameter validation: CLAHE clip_limit > 0, tile_grid_size valid (e.g., (8,8)), kernel dimensions odd and positive
    - Geometry validation: Check perimeter > 0 before circularity calculation, area > 0 before equivalent diameter
    - Threshold validation: Verify area_range [min, max] with min < max, aspect_ratio_range [0.25, 4.0]
    - Output validation: Confirm CSV contains expected columns, no NaN/Inf in physical unit conversions

