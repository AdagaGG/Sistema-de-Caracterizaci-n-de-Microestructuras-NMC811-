patterns_found:
- category: image_io
  pattern: 16-bit TIFF preservation with tifffile
  description: |
    FIB-SEM microscopy images stored as 16-bit TIFF require specialized loading to preserve bit depth.
    Standard libraries (PIL, cv2.imread) may convert to 8-bit, losing dynamic range critical for preprocessing.
  examples:
  - file: tifffile documentation
    location: /cgohlke/tifffile
    snippet: |
      import numpy as np
      from tifffile import imread
      # Read 16-bit TIFF preserving dtype
      image = imread('microscopy_data.tif')
      print(f"Shape: {image.shape}, dtype: {image.dtype}")  # dtype: uint16
  prevalence: required

- category: preprocessing
  pattern: CLAHE adaptive histogram equalization
  description: |
    Contrast Limited Adaptive Histogram Equalization (CLAHE) enhances local contrast by dividing image into tiles
    and equalizing each tile's histogram with contrast limiting to avoid noise amplification. Critical for compensating
    brightness gradients and enhancing cracks in FIB-SEM images.
  examples:
  - file: OpenCV CLAHE documentation
    location: /websites/opencv_5_x
    snippet: |
      import cv2 as cv
      img = cv.imread('input.png', cv.IMREAD_GRAYSCALE)
      # Create CLAHE object with tunable parameters
      clahe = cv.createCLAHE(clipLimit=2.0, tileGridSize=(8,8))
      cl1 = clahe.apply(img)
  prevalence: required

- category: morphological_operations
  pattern: Opening operation for particle separation
  description: |
    Morphological opening (erosion followed by dilation) removes small protrusions and separates touching particles.
    Used to refine binary masks after segmentation, ensuring adjacent particles are properly separated.
  examples:
  - file: OpenCV morphology documentation
    location: /websites/opencv_5_x
    snippet: |
      import cv2 as cv
      # Opening = erosion + dilation
      kernel = cv.getStructuringElement(cv.MORPH_RECT, (5, 5))
      opening = cv.morphologyEx(img, cv.MORPH_OPEN, kernel)
      # Alternative: manual erosion → dilation
      eroded = cv.erode(img, kernel, iterations=1)
      opened = cv.dilate(eroded, kernel, iterations=1)
  prevalence: required

- category: morphological_operations
  pattern: Structuring element (kernel) selection
  description: |
    Structuring elements define neighborhood shape for morphological operations. Common shapes: rectangle (MORPH_RECT),
    ellipse (MORPH_ELLIPSE), cross (MORPH_CROSS). Size and shape impact separation effectiveness.
  examples:
  - file: OpenCV structuring element
    location: /websites/opencv_5_x
    snippet: |
      import cv2 as cv
      # Rectangular kernel 5x5
      rect_kernel = cv.getStructuringElement(cv.MORPH_RECT, (5, 5))
      # Elliptical kernel 7x7
      ellipse_kernel = cv.getStructuringElement(cv.MORPH_ELLIPSE, (7, 7))
  prevalence: common

- category: edge_handling
  pattern: Edge particle exclusion via clear_border
  description: |
    Particles touching image boundaries are incomplete and excluded from analysis for more precise measurements.
    Scikit-image provides clear_border function, or manual numpy mask operations can identify border-touching regions.
  examples:
  - file: scikit-image clear_border (inferred from regionprops docs)
    location: /scikit-image/scikit-image
    snippet: |
      # Manual border detection approach
      import numpy as np
      from scipy import ndimage
      labeled, _ = ndimage.label(binary_mask)
      # Identify labels touching borders
      border_labels = np.unique(np.concatenate([
          labeled[0, :], labeled[-1, :], labeled[:, 0], labeled[:, -1]
      ]))
      border_labels = border_labels[border_labels != 0]  # Remove background
      # Create mask excluding border particles
      mask = np.isin(labeled, border_labels, invert=True)
  prevalence: required

- category: validation
  pattern: Combined area + circularity + aspect ratio filtering
  description: |
    Multi-criteria validation reduces false positives from noise/artifacts. Area filter removes too-small (noise)
    and too-large (merged) particles. Aspect ratio filter removes extreme elongations (artifacts). Circularity
    exported without minimum threshold for posterior analysis.
  examples:
  - file: PRD validation thresholds
    location: docs/PRD.yaml:62-66
    snippet: |
      validation_thresholds:
        area_range_pixels: [50, 10000]
        circularity_min: null  # No minimum, export all
        aspect_ratio_range: [0.25, 4.0]  # 1:4 to 4:1 ratio
        exclude_edge_particles: true
  prevalence: required

- category: geometry_measurement
  pattern: Contour-based geometric metrics
  description: |
    OpenCV findContours + contour functions extract geometric properties: area (contourArea), perimeter (arcLength),
    circularity (4πA/P²), bounding rectangle (boundingRect for aspect ratio), equivalent diameter (√(4A/π)).
  examples:
  - file: OpenCV contour analysis
    location: /websites/opencv_5_x
    snippet: |
      import cv2 as cv
      import numpy as np
      contours, _ = cv.findContours(binary_mask, cv.RETR_LIST, cv.CHAIN_APPROX_NONE)
      for cnt in contours:
          area = cv.contourArea(cnt)
          perimeter = cv.arcLength(cnt, True)
          circularity = 4 * np.pi * area / (perimeter ** 2) if perimeter > 0 else 0
          x, y, w, h = cv.boundingRect(cnt)
          aspect_ratio = float(w) / h if h > 0 else 0
  prevalence: required

- category: data_export
  pattern: Pandas DataFrame to CSV consolidation
  description: |
    Geometric metrics from multiple images consolidated into single pandas DataFrame, then exported to CSV for
    statistical analysis. DataFrame supports column-based organization and easy appending of results.
  examples:
  - file: pandas to_csv documentation
    location: /websites/pandas_pydata
    snippet: |
      import pandas as pd
      df = pd.DataFrame([
          ["img1", 1, 1200, 150, 0.85, 35.6],
          ["img1", 2, 890, 128, 0.72, 30.1]
      ], columns=["image", "particle_id", "area_px", "perimeter_px", "circularity", "diameter_um"])
      df.to_csv("analisis_gold_standard.csv", index=False)
  prevalence: required

