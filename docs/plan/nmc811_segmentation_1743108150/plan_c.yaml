plan_id: nmc811_segmentation_1743108150
objective: Develop a modular Computer Vision pipeline using MobileSAM and Python to automatically segment active material particles in 16-bit FIB-SEM .tif images, generating exportable geometric datasets to Excel for deep statistical analysis of cathode degradation
created_at: "2025-01-26T00:00:00Z"
created_by: gem-planner
status: pending_approval
research_confidence: high

plan_metrics:
  wave_1_task_count: 3
  total_dependencies: 11
  risk_score: medium

tldr: |
  Variant C: Parallel development strategy for maximum velocity
  
  This plan prioritizes speed by enabling maximum parallelization across independent modules. Wave 1 launches three independent tasks simultaneously (conda environment setup, project structure scaffolding, and utility module development). Wave 2 builds core segmentation and preprocessing modules in parallel, while Wave 3 handles metrics extraction and validation. Integration testing begins in Wave 4 once all core modules are ready, followed by final system validation and documentation delivery.
  
  Key differentiators from other variants:
  - Aggressive parallel execution with 3 wave-1 tasks (vs 1-2 in other variants)
  - Modular design enabling early testing without full pipeline completion
  - Lower risk score through early environment validation and incremental testing
  - Emphasis on deliverable-focused tasks with clear acceptance criteria

open_questions:
  - Should CLAHE parameters (clip_limit, tile_grid_size) be configurable via config file or hardcoded constants?
  - Do we need a GUI for manual refinement prompting or is CLI sufficient for research workflow?
  - Should we implement automatic checkpoint saving for partially processed batches in case of crashes?

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: MobileSAM model weights download fails or incompatible with PyTorch version
      likelihood: medium
      impact: critical
      mitigation: Pin exact PyTorch/SAM2 versions in environment.yaml; include manual download instructions as fallback; verify model loading in dedicated environment setup task with rollback procedure
    
    - scenario: 16-bit TIFF loading corrupts data or loses precision during normalization
      likelihood: low
      impact: high
      mitigation: Implement bit-depth validation unit tests in preprocessing module; use tifffile.imread with explicit dtype preservation; add visual diff comparison between original and preprocessed images
    
    - scenario: VRAM overflow despite sequential processing due to memory leak or large image dimensions
      likelihood: medium
      impact: high
      mitigation: Add explicit torch.cuda.empty_cache() after each image; implement dynamic image tiling if base image exceeds 4096x4096; monitor VRAM usage with pynvml library and fail-fast with clear error message
    
    - scenario: Morphological operations over-erode small particles or under-separate adjacent particles
      likelihood: medium
      impact: medium
      mitigation: Make kernel size configurable; implement visual validation task to compare raw masks vs refined masks on sample images; add threshold-based override for extreme cases
    
    - scenario: Circularity calculation returns NaN or infinity due to zero perimeter contours
      likelihood: low
      impact: low
      mitigation: Add defensive checks in metrics module; filter out invalid contours with perimeter < 3 pixels before calculation; log warning and skip particle instead of crashing pipeline

  assumptions:
    - Gold standard images are correctly calibrated at 0.08431 μm/px scale
    - RTX 4060 GPU has CUDA 12.x drivers compatible with PyTorch 2.x
    - All 6 images have similar dimensions (3072x1024 based on research findings)
    - Conda is already installed on target system
    - Researcher has basic Python knowledge for running CLI scripts
    - MobileSAM pretrained weights are publicly accessible via official SAM2 repository
    - Windows file paths with spaces are handled correctly by Python libraries

implementation_specification:
  code_structure: |
    Modular monorepo with clear separation of concerns:
    
    nmc811_segmentation/
      config/
        config.yaml                    # Centralized configuration (paths, thresholds, CLAHE params)
        environment.yaml               # Conda environment specification
      src/
        utils/
          image_io.py                  # 16-bit TIFF loading/saving with tifffile
          gpu_manager.py               # VRAM monitoring and cleanup utilities
          logger.py                    # Structured logging setup
        preprocessing/
          clahe.py                     # CLAHE adaptive histogram equalization
          normalizer.py                # Bit-depth normalization utilities
        segmentation/
          mobilesam_engine.py          # MobileSAM model initialization and inference
          prompt_generator.py          # Automatic grid-based prompt generation
          manual_refine.py             # Optional interactive refinement interface
        postprocessing/
          morphology.py                # Morphological opening/closing operations
          edge_handler.py              # Border particle detection and exclusion
        metrics/
          geometric.py                 # Area, perimeter, circularity, diameter calculations
          validator.py                 # Multi-criteria particle filtering
        visualization/
          heatmap.py                   # Circularity-based color mapping
          overlay.py                   # Mask overlay generation for validation
        export/
          csv_exporter.py              # Consolidated DataFrame export
      pipeline/
        main.py                        # Entry point orchestrating full workflow
        batch_processor.py             # Sequential image iteration with VRAM cleanup
      tests/
        test_preprocessing.py
        test_metrics.py
        test_validation.py
      outputs/
        masks/                         # Binary segmentation masks (16-bit PNG)
        visualizations/                # Heatmap overlays (8-bit RGB PNG)
        metrics/                       # CSV exports
      gold_standard/                   # Input images (already exists)
      README.md
      requirements.txt                 # Pip fallback if conda unavailable

  affected_areas:
    - New greenfield project; no existing code to modify
    - gold_standard/ directory (read-only input source)
    - docs/ directory (documentation updates after completion)

  component_details:
    - component: utils.image_io
      responsibility: Load 16-bit TIFF images without precision loss using tifffile.imread; save processed outputs in appropriate formats (PNG for masks, CSV for metrics)
      interfaces:
        - load_16bit_tiff(filepath: Path) -> np.ndarray (dtype=uint16)
        - save_mask(mask: np.ndarray, filepath: Path) -> None
        - validate_bit_depth(image: np.ndarray) -> bool

    - component: utils.gpu_manager
      responsibility: Monitor VRAM usage via pynvml; provide cleanup utility to free CUDA memory between images; fail-fast if memory threshold exceeded
      interfaces:
        - get_vram_usage() -> float (GB)
        - cleanup_vram() -> None
        - check_vram_threshold(max_gb: float = 7.5) -> bool

    - component: preprocessing.clahe
      responsibility: Apply CLAHE adaptive histogram equalization to enhance contrast and reveal cracks; configurable clip_limit and tile_grid_size parameters
      interfaces:
        - apply_clahe(image: np.ndarray, clip_limit: float = 2.0, tile_grid_size: tuple = (8, 8)) -> np.ndarray

    - component: segmentation.mobilesam_engine
      responsibility: Initialize MobileSAM model with pretrained weights; generate segmentation masks using hybrid automatic + manual prompting strategy; operate in inference mode to minimize VRAM
      interfaces:
        - initialize_model(checkpoint_path: Path, device: str = "cuda") -> SAM2ImagePredictor
        - generate_masks_auto(image: np.ndarray) -> List[Dict[str, np.ndarray]]
        - refine_mask_manual(image: np.ndarray, point_prompts: List[Tuple[int, int]]) -> np.ndarray

    - component: postprocessing.morphology
      responsibility: Apply morphological opening (erosion followed by dilation) to separate touching particles in binary masks; configurable kernel size for tuning
      interfaces:
        - morphological_opening(mask: np.ndarray, kernel_size: int = 3) -> np.ndarray
        - separate_particles(mask: np.ndarray) -> np.ndarray

    - component: postprocessing.edge_handler
      responsibility: Detect particles touching image borders and exclude them from analysis per PRD requirement; use scikit-image clear_border or manual mask operations
      interfaces:
        - exclude_border_particles(labeled_mask: np.ndarray) -> np.ndarray
        - is_edge_particle(particle_mask: np.ndarray) -> bool

    - component: metrics.geometric
      responsibility: Calculate area, perimeter, circularity (4πA/P²), equivalent diameter per particle; convert pixel measurements to physical units (μm) using 0.08431 μm/px scale; handle edge cases (zero perimeter)
      interfaces:
        - extract_metrics(labeled_mask: np.ndarray, scale: float = 0.08431) -> pd.DataFrame
        - calculate_circularity(area: float, perimeter: float) -> float
        - convert_to_physical_units(pixel_value: float, scale: float) -> float

    - component: metrics.validator
      responsibility: Apply multi-criteria particle filtering (area [50-10000], aspect_ratio [0.25-4.0], no circularity minimum); return filtered DataFrame with only valid particles
      interfaces:
        - validate_particles(metrics_df: pd.DataFrame, thresholds: Dict) -> pd.DataFrame
        - apply_area_filter(df: pd.DataFrame, min_area: int, max_area: int) -> pd.DataFrame
        - apply_aspect_ratio_filter(df: pd.DataFrame, min_ratio: float, max_ratio: float) -> pd.DataFrame

    - component: visualization.heatmap
      responsibility: Generate circularity-based heatmap overlay with red (low circularity/fractured) to green (high circularity/intact) gradient; blend with original image for validation
      interfaces:
        - generate_circularity_heatmap(metrics_df: pd.DataFrame, labeled_mask: np.ndarray) -> np.ndarray
        - apply_colormap(circularity_values: np.ndarray) -> np.ndarray (RGB)

    - component: export.csv_exporter
      responsibility: Consolidate metrics from all 6 images into single CSV file (analisis_gold_standard.csv); include columns (Image, ParticleID, Area_um2, Perimeter_um, Circularity, EquivDiameter_um)
      interfaces:
        - export_to_csv(all_metrics: List[pd.DataFrame], output_path: Path) -> None
        - format_dataframe(metrics_df: pd.DataFrame, image_name: str) -> pd.DataFrame

    - component: pipeline.batch_processor
      responsibility: Orchestrate sequential processing of 6 gold_standard images; cleanup VRAM between images; aggregate metrics and generate consolidated outputs
      interfaces:
        - process_image_batch(image_paths: List[Path], config: Dict) -> pd.DataFrame
        - process_single_image(image_path: Path, config: Dict) -> pd.DataFrame

  dependencies:
    - component: preprocessing.clahe
      relationship: Consumes raw 16-bit TIFF from utils.image_io; outputs enhanced image to segmentation.mobilesam_engine

    - component: segmentation.mobilesam_engine
      relationship: Consumes preprocessed image from preprocessing.clahe; outputs binary masks to postprocessing.morphology

    - component: postprocessing.morphology
      relationship: Consumes binary masks from segmentation.mobilesam_engine; outputs refined masks to postprocessing.edge_handler

    - component: postprocessing.edge_handler
      relationship: Consumes refined masks from postprocessing.morphology; outputs labeled masks to metrics.geometric

    - component: metrics.geometric
      relationship: Consumes labeled masks from postprocessing.edge_handler; outputs metrics DataFrame to metrics.validator

    - component: metrics.validator
      relationship: Consumes metrics DataFrame from metrics.geometric; outputs filtered DataFrame to visualization.heatmap and export.csv_exporter

    - component: visualization.heatmap
      relationship: Consumes filtered metrics from metrics.validator and labeled masks from postprocessing.edge_handler; outputs RGB heatmap images to file system

    - component: export.csv_exporter
      relationship: Consumes filtered metrics from metrics.validator (all 6 images); outputs consolidated CSV to outputs/metrics/

  integration_points:
    - Pipeline entry point (pipeline/main.py) orchestrates sequential calls to all modules
    - Configuration loaded from config/config.yaml at startup and passed to all components
    - Logging centralized via utils.logger with structured JSON output for debugging
    - GPU memory management via utils.gpu_manager integrated at batch_processor level
    - All file I/O routed through utils.image_io for consistent error handling

